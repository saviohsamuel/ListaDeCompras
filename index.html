<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="App de anotações de compras">
    <title>Quicklist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main id="app">
        <h1>Quicklist</h1>
        <button class="back">Voltar</button>
        <h2>Compras da semana</h2>
        <form action="">
            <div class="container__submit flex f-a-center">
                <input type="text" placeholder="Adicione um novo item" class="new__item">
                <button class="submit" type="submit">Adicionar item</button>
            </div>
            <div class="container__wrapper flex">
                <div class="input__wrapper flex f-a-center">
                    <div class="input flex f-a-center">
                        <input type="checkbox" id="pão">
                        <label for="pão">pão de forma</label>
                    </div>
                    <button class="delete" aria-label="button delete item"></button>
                </div>
                <div class="input__wrapper flex f-a-center">
                    <div class="input flex f-a-center">
                        <input type="checkbox" id="café">
                        <label for="café">café preto</label>
                    </div>
                    <button class="delete" aria-label="button delete item"></button>
                </div>
                <div class="input__wrapper flex f-a-center">
                    <div class="input flex f-a-center">
                        <input type="checkbox" id="suco">
                        <label for="suco">suco de laranja</label>
                    </div>
                    <button class="delete" aria-label="button delete item"></button>
                </div>
                <div class="input__wrapper flex f-a-center">
                    <div class="input flex f-a-center">
                        <input type="checkbox" id="bolacha">
                        <label for="bolacha">bolacha</label>
                    </div>
                    <button class="delete" aria-label="button delete item"></button>
                </div>
            </div>
            <div class="container__danger flex f-a-center">
                <div class="danger flex f-a-center">
                    <img src="./imgs/danger.svg" alt="Icone de aviso de item removido">
                    <p>O item <span class="list__item"></span> foi removido da lista</p>
                </div>
                <button class="close__danger" aria-label="close danger"></button>
            </div>
        </form>
    </main>
    <script src="scripts.js"></script>
</body>
</html>
